name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Install libsqlite3 (for sqlite-vec extension loading)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Eval regression gate
        env:
          CV_SQLITE_LIB: /usr/lib/x86_64-linux-gnu/libsqlite3.so.0
        run: bun run packages/eval/src/runner.ts
