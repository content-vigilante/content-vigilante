version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      root-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/packages/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      web-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      core-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cli-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/packages/eval"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      eval-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
